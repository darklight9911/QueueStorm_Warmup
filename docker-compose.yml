# One-command local run:  docker compose up --build
# Then:  curl http://localhost:8000/health
#
# This stack runs the API with 2 workers behind a shared Redis-backed rate
# limiter, demonstrating the horizontally-scalable configuration. If Redis is
# unavailable the API still serves (the limiter fails open).
services:
  api:
    build: .
    image: queuestorm-ticket-sorter:latest
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - WEB_CONCURRENCY=2
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_REQUESTS=120
      - RATE_LIMIT_WINDOW_SECONDS=60
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
